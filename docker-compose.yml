services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AUTH_DOMAIN: ${AUTH_DOMAIN}
    networks:
      - proxy

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    restart: unless-stopped
    volumes:
      - ./data/pocket-id:/app/data
    environment:
      APP_URL: https://${AUTH_DOMAIN}
      TRUST_PROXY: "true"
      ENCRYPTION_KEY: ${POCKET_ID_ENCRYPTION_KEY}
    networks:
      - proxy

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://${AUTH_DOMAIN}
      OAUTH2_PROXY_CLIENT_ID: ${OIDC_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_DOMAINS: ${BASE_DOMAIN}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_UPSTREAM: static://202
      OAUTH2_PROXY_REDIRECT_URL: https://${AUTH_DOMAIN}/oauth2/callback
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_WHITELIST_DOMAINS: .${BASE_DOMAIN}
    networks:
      - proxy

networks:
  proxy:
